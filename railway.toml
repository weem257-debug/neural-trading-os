# ============================================================
# Railway Deployment — Neural Trading OS
# ============================================================
# Deploy: railway up  (from the tradingbot/dashboard directory)
#
# Required env vars to set in Railway dashboard:
#   ANTHROPIC_API_KEY      — your Anthropic key
#   JWT_SECRET_KEY         — min 32 chars, use: openssl rand -hex 32
#                            (app refuses to boot in production without it)
#   APP_ENCRYPTION_KEY     — Fernet key for at-rest credential encryption.
#                            REQUIRED in production (boot aborts without it).
#                            Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#   APP_ENCRYPTION_KEYS_OLD— (optional) comma-separated old keys during rotation
#   TRUST_PROXY            — set "true" on Railway so rate-limiting reads the
#                            real client IP from X-Forwarded-For
#   DEMO_USERNAME          — login username (default: admin)
#   DEMO_PASSWORD          — leave default to DISABLE the demo account in prod,
#                            or set a strong non-default value to keep it enabled.
#                            A known-weak value (e.g. neural123) aborts startup.
#   ALLOWED_ORIGINS        — comma-separated real frontend origin(s); no localhost
#                            is honoured in production (CORS lockdown)
#   PRODUCTION_URL         — your Railway frontend URL after first deploy
#                            e.g. https://neural-trading-os-frontend.up.railway.app
#   NEXT_PUBLIC_APP_URL    — same URL for sitemap/OG image base
#
# Stripe Billing (optional — 503 without these):
#   STRIPE_SECRET_KEY       — sk_live_... or sk_test_...
#   STRIPE_WEBHOOK_SECRET   — whsec_...  (from Stripe dashboard)
#   STRIPE_PRICE_BASIC      — price_...  (€29/mo)
#   STRIPE_PRICE_PRO        — price_...  (€99/mo)
#   STRIPE_PRICE_INST       — price_...  (€299/mo)
#   STRIPE_PRICE_SIGNALS    — price_...  (€19/mo Signal Marketplace)
#   FRONTEND_URL            — https://your-frontend.railway.app (for Stripe redirects)
#
# Optional (for real data):
#   FINNHUB_API_KEY, ALPACA_API_KEY, ALPACA_SECRET_KEY, etc.
# ============================================================

[build]
builder = "dockerfile"

# ─── Backend Service ──────────────────────────────────────────────────────────
[[services]]
name = "backend"
source = "backend"

[services.build]
dockerfilePath = "backend/Dockerfile"

[services.deploy]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"

[[services.variables]]
name = "ENVIRONMENT"
value = "production"

[[services.variables]]
name = "DATABASE_URL"
value = "${{Postgres.DATABASE_URL}}"

[[services.variables]]
name = "REDIS_URL"
value = "${{Redis.REDIS_URL}}"

[[services.variables]]
name = "ENABLE_LIVE_TRADING"
value = "false"

[[services.variables]]
name = "ENABLE_PAPER_TRADING"
value = "true"

[[services.variables]]
name = "YAHOO_FINANCE_ENABLED"
value = "true"

# ─── Frontend Service ─────────────────────────────────────────────────────────
[[services]]
name = "frontend"
source = "frontend"

[services.build]
dockerfilePath = "frontend/Dockerfile"
buildArgs = { NEXT_PUBLIC_APP_NAME = "Neural Trading OS", NEXT_PUBLIC_PAPER_MODE = "true" }

[services.deploy]
startCommand = "node server.js"
healthcheckPath = "/"
restartPolicyType = "on_failure"

[[services.variables]]
name = "NODE_ENV"
value = "production"
