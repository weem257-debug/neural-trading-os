name: Uptime Monitor

on:
  schedule:
    # GitHub garantiert keine exakte Ausfuehrung; reale Kadenz ~5-15 Min.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Backend /api/health
        run: |
          body=$(curl -sS --fail-with-body --max-time 30 --retry 3 --retry-delay 5 --retry-all-errors \
            https://neural-trading-os-production.up.railway.app/api/health)
          echo "$body"
          echo "$body" | grep -q '"status":"healthy"' || { echo "::error::Backend nicht healthy"; exit 1; }

      - name: Frontend /
        run: |
          curl -sS --fail --max-time 30 --retry 3 --retry-delay 5 --retry-all-errors -o /dev/null \
            https://frontend-production-8a00.up.railway.app/
