[pytest]
# Restrict collection to the app's own suite. Without this, a bare `pytest`
# from backend/ recurses into vendored engines/ (nautilus, FinGPT, AI-Trader),
# which fail to import native libs and break collection. CI already scopes to
# backend/tests/; this makes local runs match.
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
filterwarnings =
    ignore::RuntimeWarning:tradingagents.*
